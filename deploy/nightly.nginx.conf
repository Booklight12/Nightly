server {
    listen 80;
    listen [::]:80;

    server_name game.sormaze.com;
    include /etc/nginx/cloudflare-only.conf;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name game.sormaze.com;
    include /etc/nginx/cloudflare-only.conf;

    ssl_certificate     /etc/nginx/ssl/sormaze.com.pem;
    ssl_certificate_key /etc/nginx/ssl/sormaze.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;

    location ^~ /have/nightly/assets/ {
        alias /opt/nightly/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ ^/have/nightly/(favicon|file|globe|window)\.svg$ {
        rewrite ^/have/nightly/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:30082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    location = /have/nightly/manifest.webmanifest {
        alias /opt/nightly/current/dist/client/manifest.webmanifest;
        default_type application/manifest+json;
        expires 1d;
        access_log off;
    }

    location = /have/nightly {
        proxy_pass http://127.0.0.1:30082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /have/nightly/ {
        proxy_pass http://127.0.0.1:30082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 404;
    }

    location ~ /\. {
        deny all;
    }
}
